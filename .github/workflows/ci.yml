name: Continuous Integration

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  lint-and-format:
    name: Lint & Format Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Frontend Linting
        run: npm run lint

      - name: Frontend Type Check
        run: npm run build

      - name: Rust Toolchain Setup
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Formatting Check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust Clippy Lints
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  test-and-check-matrix:
    name: Check & Test
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo dpkg --add-architecture amd64
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl wget file \
            pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libxdo-dev \
            libayatana-appindicator3-dev librsvg2-dev

          # Ensure pkg-config can find .pc files
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/$(dpkg-architecture -qDEB_HOST_MULTIARCH)/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"

      - name: Verify glib pkg-config resolution (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          pkg-config --modversion glib-2.0
          pkg-config --cflags --libs glib-2.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Setup Sidecars
        run: node scripts/setup-sidecars.cjs

      - name: Cargo Check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
