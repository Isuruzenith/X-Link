name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release X-Link
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          $contains = git branch -r --contains ${{ github.ref_name }}
          if ($contains -like "*origin/main*") {
              Write-Output "Tag is on main branch. Proceeding with release."
          } else {
              Write-Error "Error: Tag is not on the main branch. Aborting release."
              exit 1
          }

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'X-Link v__VERSION__'
          releaseBody: 'Release of X-Link v__VERSION__'
          releaseDraft: true
          prerelease: false
